<!--
My Create Project is a choose your own adventure game.
When you open the website, you will enter your name and 
hit play. Over the course of the game, a story will be told
and you will have to make decisions. You will obtain 
collectables along the way (stored in a list) and, at the end 
of the game, you will be told which you got and how many you have 
left to find. Using a loop feature, you will start the story over
and have to try to find the other collectables.
Functions will include animations,
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Choose Your Own Adventure</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sekuya&display=swap" rel="stylesheet">
</head>

<body>

    <h1 id="title">Choose Your Own Adventure</h1>

    <h2 id="header">Enter Your Name</h2>
    <input type="text" id="name" placeholder="Enter your name here">
    <button disabled id="nameBtn">Save Your Name</button>

    <br><br>

    <button id="startBtn">Start</button>

    <hr>


    <div id = "gameArea"></div>
    <div id = "storyTxt">
        <p>Story text will appear here...</p>
    </div>

    <div id="choices">
        <button id = "c1">Choice 1</button>
        <button id = "c2">Choice 2</button>
    </div>
</div>
</body>
</html>
