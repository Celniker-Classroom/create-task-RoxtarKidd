<!-- My Create Project is a choose  your own adventure game.
 When you open the website, you will enter your name and hit play.
 Over the course of the game, a story will be told and you will have to make decisions.
 You will obtain collectables along the way (Stored in a list) and, at the end of the game,
 you will be told which you got and how many you have left to find.
 Using a loop feature, you will start the story over and have to try to find the other collectables. -->

<html lang="en">

</head>
<body>

<h1 id = title>Choose Your Own Adventure</h1>

<input type="text" id = "name" placeholder = "Enter your name here">

<br><br>
<button id = startBtn>Start</button>
</body>
</html>
