<!--
My Create Project is a choose your own adventure game.
When you open the website, you will enter your name and 
hit play. Over the course of the game, a story will be told
and you will have to make decisions, such as opening chests and defeating dragons. You will items 
along the way (stored in a list) and, after defeating one dragon, 
you will be told to go on the other path.

-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Choose Your Own Adventure</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sekuya&display=swap" rel="stylesheet">
</head>

<body>
    <div class="game-container">
        <h1 id="title">Choose Your Own Adventure</h1>
        <h2 id="header">Enter Your Name</h2>
        
        <input type="text" id="name" placeholder="Enter your name here.">
        <button disabled id="nameBtn">Save Your Name</button>
        <br><br>
        
        <button disabled id="startBtn">Start</button>
        <button disabled id="restartBtn">Restart</button>
        
        <hr>

        <div id="storyTxt">
            <p>Story text will appear here...</p>
        </div>

        <div id="choices">
            <button disabled id="c1">Choice 1</button>
            <button disabled id="c2">Choice 2</button>
        </div>

        <div class="info-section">
            <h2>Your Actions</h2>
            <div id="yourActions">Your actions will appear here...</div>
        </div>

        <div class="info-section">
            <h2>Inventory</h2>
            <div id="inventory">Your inventory will appear here...</div>
        </div>
    </div>
</body>
